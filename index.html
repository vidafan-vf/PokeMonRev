<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Rev!</title>
    <!-- 引入 html5-qrcode 函式庫 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Marked.js 用於將 Markdown 轉為 HTML 顯示 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #reader { border: none !important; }
        #reader video { border-radius: 1rem; object-fit: cover; }
        .scan-region-highlight { border-radius: 1rem !important; outline: 2px solid #ef4444 !important; }
        
        /* Modal 樣式優化 */
        .prose img { margin: 0 auto; border-radius: 1rem; background: #f8fafc; padding: 1rem; border: 1px solid #e2e8f0; max-width: 100%; height: auto; }
        .prose h1 { color: #ef4444; border-bottom: 2px solid #fee2e2; padding-bottom: 0.5rem; font-size: 1.5rem; }
        
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 3s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- 導覽列 -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-30 px-4 py-3 shadow-sm">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <h1 class="text-xl font-black text-slate-800 tracking-tight">POKÉMON <span class="text-red-600">REV!</span></h1>
            <div id="https-warning" class="hidden text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded-full font-bold">非安全連線</div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <!-- 掃描區域容器 -->
        <div class="relative bg-white p-2 rounded-3xl shadow-xl shadow-slate-200 overflow-hidden border border-slate-100">
            <div id="reader" class="w-full aspect-square overflow-hidden rounded-2xl bg-slate-100"></div>
            
            <!-- 初始提示 UI -->
            <div id="placeholder-ui" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <div class="w-20 h-20 border-4 border-slate-200 border-dashed rounded-full animate-spin-slow mb-4"></div>
                <p class="text-slate-400 font-medium text-sm">請點擊下方按鈕啟動相機</p>
            </div>
        </div>

        <!-- 操作按鈕 -->
        <div class="flex flex-col gap-3">
            <button id="start-btn" onclick="startScanning()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-red-200 active:scale-95">
                開始掃描遊戲卡 (自動)
            </button>
            
            <!-- 動態相機按鈕容器 -->
            <div id="camera-selection-grp" class="flex flex-col gap-2"></div>

            <button id="stop-btn" onclick="stopScanning()" class="hidden w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-4 rounded-2xl transition-all">
                停止相機
            </button>
        </div>

        <!-- 錯誤提示 -->
        <div id="error-msg" class="hidden p-4 bg-red-50 text-red-600 rounded-2xl text-sm font-medium border border-red-100"></div>
    </main>

    <!-- 結果彈窗 -->
    <div id="result-modal" class="hidden fixed inset-0 z-50 flex-col bg-white">
        <div class="flex items-center justify-between p-4 border-b">
            <h2 class="font-bold text-slate-800">卡片詳細資訊</h2>
            <button onclick="closeModal()" class="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="scroll-area" class="flex-1 overflow-y-auto p-4">
            <div id="markdown-content" class="prose prose-slate max-w-none prose-img:shadow-md"></div>
            
            <!-- 原始資料折疊區 -->
            <div class="mt-8 pt-8 border-t border-slate-100">
                <details class="group">
                    <summary class="list-none cursor-pointer flex items-center text-slate-400 text-sm font-medium">
                        <span class="group-open:rotate-90 transition-transform mr-2">▶</span> 檢視原始 Markdown 資料
                    </summary>
                    <textarea id="raw-markdown" readonly class="mt-4 w-full h-48 p-4 bg-slate-50 rounded-xl text-xs font-mono text-slate-500 border border-slate-200 focus:outline-none"></textarea>
                </details>
            </div>
        </div>
    </div>

    <script>
        let html5QrCode;
        const modal = document.getElementById('result-modal');
        const markdownDiv = document.getElementById('markdown-content');
        const rawTextarea = document.getElementById('raw-markdown');
        const errorMsg = document.getElementById('error-msg');
        const cameraContainer = document.getElementById('camera-selection-grp');
        const scrollArea = document.getElementById('scroll-area');

        // 初始化
        window.addEventListener('load', () => {
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                document.getElementById('https-warning').classList.remove('hidden');
            }
            // 預先建立實例
            html5QrCode = new Html5Qrcode("reader");
            
            // 手機端可能需要使用者互動後才能列出相機，先嘗試一次
            setTimeout(detectCameras, 1000);
        });

        async function detectCameras() {
            try {
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    cameraContainer.innerHTML = '';
                    devices.forEach((camera, index) => {
                        const btn = document.createElement('button');
                        btn.innerText = camera.label || `指定鏡頭 ${index + 1}`;
                        btn.className = "w-full bg-white text-slate-600 border border-slate-200 font-medium py-3 rounded-xl transition-all text-xs hover:bg-slate-50 active:scale-95";
                        btn.onclick = () => startScanning(camera.id);
                        cameraContainer.appendChild(btn);
                    });
                }
            } catch (err) {
                console.warn("無法獲取相機列表", err);
            }
        }

        async function startScanning(cameraId = null) {
            hideError();
            
            // 如果正在運作中先停止
            if (html5QrCode && html5QrCode.getState() > 1) {
                try { await html5QrCode.stop(); } catch(e) {}
            }

            document.getElementById('placeholder-ui').classList.add('hidden');
            document.getElementById('start-btn').classList.add('hidden');
            cameraContainer.classList.add('hidden');
            document.getElementById('stop-btn').classList.remove('hidden');

            const config = { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };
            
            const cameraMode = cameraId ? { deviceId: { exact: cameraId } } : { facingMode: "environment" };

            try {
                await html5QrCode.start(cameraMode, config, onScanSuccess);
                
                // 啟動成功後，如果是手機端，再次嘗試更新相機標籤（此時權限已獲得）
                detectCameras();

                // 嘗試設定 2.0x 縮放
                setTimeout(() => {
                    try {
                        const videoTrack = html5QrCode.getRunningTrack();
                        if (videoTrack) {
                            const capabilities = videoTrack.getCapabilities();
                            if (capabilities.zoom) {
                                // 設定為 2 倍，或該裝置支援的最大值
                                const targetZoom = Math.min(2.0, capabilities.zoom.max || 2.0);
                                videoTrack.applyConstraints({
                                    advanced: [{ zoom: targetZoom }]
                                }).catch(e => console.warn("縮放套用失敗"));
                            }
                        }
                    } catch (e) {
                        console.warn("此裝置不支援獲取軌道資訊");
                    }
                }, 1500);

            } catch (err) {
                showError("無法啟動相機，請檢查權限設定。");
                stopScanning();
            }
        }

        function stopScanning() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('start-btn').classList.remove('hidden');
                    cameraContainer.classList.remove('hidden');
                    document.getElementById('stop-btn').classList.add('hidden');
                    document.getElementById('placeholder-ui').classList.remove('hidden');
                }).catch(err => {
                    // 若已經停止則忽略
                    document.getElementById('start-btn').classList.remove('hidden');
                    cameraContainer.classList.remove('hidden');
                    document.getElementById('stop-btn').classList.add('hidden');
                });
            }
        }

        function onScanSuccess(decodedText) {
            if (decodedText.startsWith('rev_pk_')) {
                stopScanning();
                fetchPokemonData(decodedText);
            } else {
                showError("非有效的 Pokemon Rev 遊戲代碼。");
            }
        }

        async function fetchPokemonData(code) {
            try {
                const id = code.replace('rev_pk_', '');
                const response = await fetch(`https://raw.githubusercontent.com/riddleling/pokedata/main/data/${id}.json`);
                if (!response.ok) throw new Error('找不到卡片資料');
                const data = await response.json();
                
                const apiRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${data.secondary_id}`);
                const apiData = await apiRes.json();
                
                renderMarkdown(data, apiData);
                openModal();
            } catch (err) {
                showError("抓取失敗：" + err.message);
                stopScanning();
            }
        }

        const statTranslations = {
            'hp': '生命 (HP)',
            'attack': '攻擊 (Atk)',
            'defense': '防禦 (Def)',
            'special-attack': '特攻 (Sp.Atk)',
            'special-defense': '特防 (Sp.Def)',
            'speed': '速度 (Spe)'
        };

        function renderMarkdown(local, api) {
            const types = api.types.map(t => `\`${t.type.name.toUpperCase()}\``).join(' ');
            const abilities = api.abilities.map(a => `- ${a.ability.name}`).join('\n');
            const imageUrl = api.sprites.other['official-artwork'].front_default;
            
            const md = `
# ${local.C_name} (${local.E_name.toUpperCase()})
---
![${local.C_name}](${imageUrl})

### 📋 基本資訊
- **卡片 ID**: \`${local.secondary_id}\`
- **屬性**: ${types}
- **身高**: ${api.height / 10} m
- **體重**: ${api.weight / 10} kg

### 📝 備註
> ${local.memo}

### 🌟 特性 (Abilities)
${abilities}

### 📊 基礎數值 (Stats)
${api.stats.map(s => `- **${statTranslations[s.stat.name] || s.stat.name}**: ${s.base_stat}`).join('\n')}
            `;

            rawTextarea.value = md.trim();
            markdownDiv.innerHTML = marked.parse(md);
        }

        function openModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            if (
