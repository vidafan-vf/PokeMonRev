<!DOCTYPE html>
<html lang="zh-Hant">

    <meta charset="UTF-8">

    <title>Pokemon Rev!</title>
    <!-- 引入 html5-qrcode 函式庫 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Marked.js 用於將 Markdown 轉為 HTML 顯示 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #reader { border: none !important; }
        #reader video { border-radius: 1rem; object-fit: cover; }
        .scan-region-highlight { border-radius: 1rem !important; outline: 2px solid #ef4444 !important; }
        
        /* Modal 樣式優化 */
        .prose img { margin: 0 auto; border-radius: 1rem; background: #f8fafc; padding: 1rem; border: 1px solid #e2e8f0; max-width: 100%; height: auto; }
        .prose h1 { color: #ef4444; border-bottom: 2px solid #fee2e2; padding-bottom: 0.5rem; font-size: 1.5rem; }
        .prose h3 { color: #1e293b; margin-top: 1.25rem; margin-bottom: 0.5rem; border-left: 4px solid #ef4444; padding-left: 0.75rem; font-size: 1.1rem; }
        .prose blockquote { border-left-color: #ef4444; background: #fff1f2; padding: 0.5rem 1rem; border-radius: 0 0.5rem 0.5rem 0; font-style: normal; }
        .prose audio { width: 100%; height: 36px; margin-top: 0.5rem; }
        .prose code { background: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; }
        
        /* 隱藏滾動條但保留功能 (可選) */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4">

    <!-- 主容器 -->
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-6 space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-black text-red-600 tracking-tighter">POKÉMON REV!</h1>
            <p class="text-slate-500 text-sm font-medium">掃描遊戲卡 QR Code 獲取寶可夢資訊</p>
        </header>

        <!-- DEBUG 顯示區 (除錯用，之後可移除) -->
        <div id="debug-panel" class="bg-yellow-50 border border-yellow-200 p-3 rounded-xl text-[10px] font-mono overflow-x-auto">
            <p class="font-bold text-yellow-700 mb-1 uppercase text-[9px]">Debug: Scanned String</p>
            <div id="debug-raw-string" class="text-slate-600 break-all italic">尚未掃描內容</div>
        </div>

        <!-- 安全連線警告 -->
        <div id="https-warning" class="hidden bg-amber-50 border-l-4 border-amber-500 text-amber-700 p-3 text-xs">
            ⚠️ 建議在 HTTPS 環境下執行以開啟相機功能。
        </div>

        <!-- 掃描區域 -->
        <div class="relative overflow-hidden rounded-2xl bg-slate-900 aspect-square flex items-center justify-center">
            <div id="reader" class="w-full h-full"></div>
            <div id="placeholder-ui" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-800 pointer-events-none">
                <div class="w-16 h-16 border-4 border-red-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <span class="text-slate-400 text-sm">等待相機啟動...</span>
            </div>
        </div>

        <!-- 操作按鈕 -->
        <div class="flex flex-col gap-3">
            <button id="start-btn" onclick="startScanning()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-red-200 active:scale-95">
                開始掃描遊戲卡
            </button>
            <button id="stop-btn" onclick="stopScanning()" class="hidden w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-4 rounded-2xl transition-all">
                停止相機
            </button>
        </div>

        <!-- 手動輸入區域 -->
        <div class="border-t border-slate-100 pt-4">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">手動查詢 (中英文名稱)</label>
            <div class="flex gap-2">
                <input type="text" id="manual-id" placeholder="例如: 皮卡丘 或 Pikachu" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none text-sm">
                <button onclick="handleManualInput()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-sm font-bold active:scale-95">查詢</button>
            </div>
        </div>

        <div id="error-msg" class="hidden text-center text-red-500 text-sm font-bold animate-pulse italic"></div>
    </div>

    <!-- Markdown 結果跳窗 (RWD 優化) -->
    <div id="result-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <!-- 寬度設為與主畫面一致的 max-w-md -->
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[85vh] animate-in fade-in zoom-in duration-300">
            <!-- Modal Header -->
            <div class="bg-red-600 p-4 flex justify-between items-center text-white shrink-0">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                    詳細資訊

                <button onclick="closeModal()" class="bg-white/20 hover:bg-white/40 p-1 rounded-full transition-colors">

                </button>
            </div>
            
            <!-- Markdown 內容顯示區 -->
            <div class="p-5 overflow-y-auto flex-1">
                <div id="markdown-content" class="prose prose-slate max-w-none text-slate-700 text-sm leading-relaxed"></div>
                
                <div class="mt-8 border-t border-slate-100 pt-4">
                    <details class="group">
                        <summary class="list-none flex items-center justify-between cursor-pointer text-xs font-bold text-slate-400 uppercase tracking-widest">

                            <svg class="w-4 h-4 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                        </summary>
                        <textarea id="raw-markdown" readonly class="mt-3 w-full h-32 bg-slate-50 border border-slate-200 rounded-lg p-3 text-[10px] font-mono text-slate-500 outline-none"></textarea>
                    </details>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-4 bg-slate-50 border-t border-slate-100 shrink-0">

                    確認並回首頁
                </button>
            </div>
        </div>
    </div>

        const statTranslations = {
            "hp": "體力 (HP)", "attack": "攻擊 (Attack)", "defense": "防禦 (Defense)",
            "special-attack": "特攻 (Special Attack)", "special-defense": "特防 (Special Defense)", "speed": "速度 (Speed)"
        };

        const typeTranslations = {
            "normal": "一般", "fire": "火", "water": "水", "grass": "草", "electric": "電", "ice": "冰",
            "fighting": "格鬥", "poison": "毒", "ground": "地面", "flying": "飛行", "psychic": "超能力",
            "bug": "蟲", "rock": "岩石", "ghost": "幽靈", "dragon": "龍", "dark": "惡", "steel": "鋼", "fairy": "妖精"
        };

        let html5QrCode;
        const modal = document.getElementById('result-modal');
        const markdownDiv = document.getElementById('markdown-content');
        const rawTextarea = document.getElementById('raw-markdown');
        const errorMsg = document.getElementById('error-msg');

        window.addEventListener('load', () => {
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                document.getElementById('https-warning').classList.remove('hidden');
            }
            html5QrCode = new Html5Qrcode("reader");
        });

let html5QrCode;

function startScanning() {
    const config = { 
        fps: 10, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0
    };

    html5QrCode = new Html5Qrcode("reader");
    
    // 啟動相機
    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
    ).then(() => {
        // 相機啟動成功後隱藏預留介面
        document.getElementById('placeholder-ui').classList.add('hidden');
        document.getElementById('start-btn').classList.add('hidden');
        document.getElementById('stop-btn').classList.remove('hidden');

        // --- 新增：嘗試設定 2 倍縮放 ---
        const videoTrack = html5QrCode.getRunningTrack();
        const capabilities = videoTrack.getCapabilities();
        
        // 檢查瀏覽器是否支援 zoom 功能
        if (capabilities.zoom) {
            videoTrack.applyConstraints({
                advanced: [{ zoom: 2.0 }] // 設定為 2 倍，或 capabilities.zoom.max 的某個值
            }).catch(e => console.error("Zoom 失敗: ", e));
        }
    }).catch(err => {
        console.error("無法啟動相機: ", err);
        showError("無法開啟相機，請檢查權限或 HTTPS 設定。");
    });
}

        async function stopScanning() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
            document.getElementById('placeholder-ui').classList.remove('hidden');
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('stop-btn').classList.add('hidden');
        }

        function onScanSuccess(decodedText) {
            const scannedId = decodedText.trim();
            const debugDisplay = document.getElementById('debug-raw-string');
            if (debugDisplay) debugDisplay.innerText = scannedId;

            const foundKey = Object.keys(mappingTable).find(key => 
                mappingTable[key].secondary_id === scannedId
            );

            if (foundKey) {
                lookupPokemon(foundKey);
            } else {
                showError(`查無此 ID: ${scannedId}`);
            }
            stopScanning();
        }

        function handleManualInput() {
            const inputVal = document.getElementById('manual-id').value.trim().toLowerCase();
            if (!inputVal) return;

            const foundKey = Object.keys(mappingTable).find(key => 
                mappingTable[key].C_name === inputVal || 
                mappingTable[key].E_name.toLowerCase() === inputVal
            );

            if (foundKey) {
                lookupPokemon(foundKey);
            } else {
                showError(`找不到寶可夢: ${inputVal}`);
            }
        }

		function formatPokemonName(name) {
		    return name.toLowerCase()
		        .replace('♀', '-f')
		        .replace('♂', '-m')
		        .replace(/\s+/g, '-')      // 空格轉連字號
		        .replace(/[^a-z0-9-]/g, ''); // 刪除點、單引號等特殊字元
		}
		
        async function lookupPokemon(key) {
            hideError();
            const localData = mappingTable[key];
			

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${formatPokemonName(localData.E_name)}`);
                if (!response.ok) throw new Error("API 請求失敗");
                
                const apiData = await response.json();
                generateMarkdown(localData, apiData);
                openModal();
            } catch (err) {
                showError(`連線失敗: ${err.message}`);
            }
        }

        function generateMarkdown(local, api) {
            const types = api.types.map(t => typeTranslations[t.type.name] || t.type.name).join(' / ');
            const imageUrl = api.sprites.other['official-artwork'].front_default || api.sprites.front_default;
            const abilities = api.abilities.map(a => `- ${a.ability.name}${a.is_hidden ? ' (隱藏特性)' : ''}`).join('\n');
            const items = api.held_items.length > 0 ? api.held_items.map(i => `- ${i.item.name}`).join('\n') : "無持有物品";
            const moves = api.moves.slice(0, 10).map(m => `\`${m.move.name}\``).join(' ');
            const cryAudioUrl = api.cries ? api.cries.latest : null;
            const crySection = cryAudioUrl ? `### 🔊 叫聲 (Cries)\n<audio controls src="${cryAudioUrl}"></audio>` : "";

            const md = `
# ${local.C_name}
(${local.E_name.toUpperCase()})
---
![${local.C_name}](${imageUrl})

### 📋 基本資訊
- **卡片 ID**: \`${local.secondary_id}\`
- **屬性**: ${types}
- **身高**: ${api.height / 10} m
- **體重**: ${api.weight / 10} kg

### 📝 備註
> ${local.memo}

${crySection}

### 🌟 特性 (Abilities)
${abilities}

### 🎒 持有物品 (Held Items)
${items}

### 📊 基礎數值 (Stats)
${api.stats.map(s => `- **${statTranslations[s.stat.name] || s.stat.name}**: ${s.base_stat}`).join('\n')}

### ⚔️ 部分招式 (Moves)
${moves} ${api.moves.length > 10 ? '...' : ''}
            `;

            rawTextarea.value = md.trim();
            markdownDiv.innerHTML = marked.parse(md);
        }

        function openModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; // 禁止底層滾動
            // 需求 1: 開啟跳窗時將捲軸移至頂端
            if (scrollArea) scrollArea.scrollTop = 0;
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; // 恢復滾動
            document.getElementById('manual-id').value = '';
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(hideError, 5000);
        }

        function hideError() {
            errorMsg.classList.add('hidden');
        }
    </script>
